<!doctype html>
<html lang="ko" >
<head>
    <title>ui-input-stepper UiInputStepperElement</title>
    <meta charset="utf-8">
    <meta http-equiv="Content-Script-Type" content="text/javascript">
    <meta http-equiv="Content-Style-Type" content="text/css">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="shortcut icon" href="/favicon.ico"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="/js/ForGoogle.js"></script>
    <!-- google analytics -->
    <script>if(window.ForGoogle){ ForGoogle.analytics() }else{ console.log("failure : ForGoogle.analytics()");}</script>
    

    <!-- jquery 관련 -->
    <!-- <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js" integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8=" crossorigin="anonymous"></script> -->

    <!-- 부트스트랩 5.3.x -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel=" stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script> -->

    <!-- vue.js -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue"></script> -->
    
    <!-- meta og -->
    
    <meta property="og:title" content="ui-input-stepper">
    <meta property="og:description" content="ui-input-stepper">
    <meta name="og:image" content="http://www.mins01.com/img/logo.gif">
    <meta property="og:image:width" content="190">
    <meta property="og:image:height" content="70" />
    <meta property="og:site_name" content="ui-input-stepper" />
    <meta property="og:type" content="website">
    
    <!-- //meta og -->
    <style>
        ui-input-stepper .btn[data-action]{
            min-width: 2.4em;
            user-select: none;
            touch-action: none;
        }
        ui-input-stepper output{
           text-shadow: -1px -1px 0 var(--bs-border-color,#666), 1px -1px 0 var(--bs-border-color,#666), -1px 1px 0 var(--bs-border-color,#666), 1px 1px 0 var(--bs-border-color,#666);
        }
    </style>
    <script type="module">
        import UiInputStepperElement from '../UiInputStepperElement.esm.js'
        UiInputStepperElement.defineCustomElement();
        window.UiInputStepperElement = UiInputStepperElement;
    </script>
    <link rel=" stylesheet" href="../ui-input-stepper.css">
    <script type="module">
        import UiInputStepper from '../UiInputStepper.esm.js'
        window.UiInputStepper = UiInputStepper;
        UiInputStepper.addEventListener();
        window.addEventListener('load',(event)=>{
            UiInputStepper.initDataValue()
        })
    </script>
</head>
<body>
    <div class="container" > 
        <h1>module (esm)</h1>
    </div>

    <div class="container" oninput="console.log(event.type)"  onchange="console.log(event.type)"> 
        <h2>ui-input-stepper UiInputStepperElement</h2>
        <hr>
        <div class="my-3">
            <h4>SAMPLE - number</h4>
            <ui-input-stepper>
                <div>
                    <input type="number" value="0" min="-1000" max="1000">
                    <output></output>
                </div>
                <div>
                    <button type="button" data-action="down">down</button>
                    <button type="button" data-action="up">up</button>
                </div>
            </ui-input-stepper>
        </div>
        <hr>
        <div class="my-3">
            <h4>SAMPLE - range</h4>
            <ui-input-stepper>
                <div>
                    <input type="range" value="0" min="-1000" max="1000" id="">
                    <output></output>
                </div>
                <div>
                    <button type="button" data-action="down">down</button>
                    <button type="button" data-action="up">up</button>
                    <hr>
                    <button type="button" onclick="this.closest('ui-input-stepper').value = 5;">5로 설정</button>
                    <button type="button" onclick="this.closest('ui-input-stepper').setValue(10);">10로 설정(이벤트 발생)</button>
                    <hr>
                    <button type="button" onclick="this.closest('ui-input-stepper').querySelector('input').valueAsNumber += 10 ;">10증가</button>
                    <button type="button" onclick="UiInputStepperElement.syncValue(this);">UiInputStepperElement.syncValue(this)</button>
                    <button type="button" onclick="this.closest('ui-input-stepper').querySelector('input').valueAsNumber += 10 ; UiInputStepperElement.syncValue(this);">10증가 syncValue 호출(이벤트 발생 안함)</button>
                    <hr>
                    <button type="button" onclick="alert(this.closest('ui-input-stepper').value)">값 확인</button>

                </div>
            </ui-input-stepper>
        </div>
        <hr>
    </div>
    <hr>
    <div class="container" oninput="console.log(event.type)"  onchange="console.log(event.type)"> 
        <h2>.ui-input-stepper UiInputStepper</h2>
                <div class="my-3">
            <h4>SAMPLE - number</h4>
            <span class="ui-input-stepper">
                <button class="btn-stepper" data-stepper="down">-</button>
                <input type="number" min="-1" step="0.01" max="1"  value="0" >
                <button class="btn-stepper" data-stepper="up">+</button>
            </span>
        </div>
        <div class="my-3">
            <h4>SAMPLE - range</h4>
            <span class="ui-input-stepper ui-input-stepper-data-value">
                <button class="btn-stepper" data-stepper="down">-</button>
                <input type="range" min="-1" step="0.01" max="1"  value="0" >
                <button class="btn-stepper" data-stepper="up">+</button>
            </span>
        </div>
    </div>
</body>
</html>
